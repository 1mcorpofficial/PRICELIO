name: pricelio
description: PRICELIO – Smart price comparison app for Lithuanian stores.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.4.0

  flutter_secure_storage: ^9.0.0

  go_router: ^13.2.0

  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  mobile_scanner: ^5.2.3

  image_picker: ^1.1.2
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

flutter_native_splash:
  color: "#080312"
  android: true
  ios: true
  web: false
