openapi: 3.0.3
info:
  title: ReceiptRadar API
  version: 0.1.0
servers:
  - url: http://localhost:3000
paths:
  /auth/guest:
    post:
      summary: Create guest session
      responses:
        '200':
          description: Guest session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestSessionResponse'
  /auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/logout:
    post:
      summary: Logout
      responses:
        '204':
          description: Logged out
  /demo/session/start:
    post:
      summary: Start anonymous demo session
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemoSessionStartRequest'
      responses:
        '200':
          description: Demo session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoSessionStartResponse'
  /demo/session/claim:
    post:
      summary: Claim demo reward after auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemoSessionClaimRequest'
      responses:
        '200':
          description: Demo reward claimed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoSessionClaimResponse'
  /events/user/stream:
    get:
      summary: User live event stream (SSE)
      responses:
        '200':
          description: Stream connected
          content:
            text/event-stream:
              schema:
                type: string
  /events/ui:
    post:
      summary: Track UI/funnel event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UiEventRequest'
      responses:
        '200':
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UiEventResponse'
  /me:
    get:
      summary: Current user profile
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
  /map/stores:
    get:
      summary: Store pins with top deals
      parameters:
        - in: query
          name: city
          schema:
            type: string
        - in: query
          name: filters
          schema:
            type: string
      responses:
        '200':
          description: Store pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StorePin'
  /stores/{id}:
    get:
      summary: Store detail card
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Store detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreDetail'
  /city/{city}/feed:
    get:
      summary: City feed
      parameters:
        - in: path
          name: city
          required: true
          schema:
            type: string
      responses:
        '200':
          description: City feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityFeed'
  /search:
    get:
      summary: Search products
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: city
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchResult'
  /products/{id}:
    get:
      summary: Product detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
  /baskets:
    post:
      summary: Create basket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasketCreateRequest'
      responses:
        '200':
          description: Basket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Basket'
  /baskets/{id}/items:
    post:
      summary: Add items to basket
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasketItemsRequest'
      responses:
        '200':
          description: Basket updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Basket'
  /baskets/{id}/optimize:
    post:
      summary: Optimize basket
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasketOptimizeRequest'
      responses:
        '200':
          description: Optimization plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasketPlan'
  /receipts/upload:
    post:
      summary: Upload receipt image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReceiptUploadRequest'
      responses:
        '200':
          description: Receipt upload accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptStatus'
  /receipts/{id}/status:
    get:
      summary: Receipt processing status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptStatus'
  /receipts/{id}/report:
    get:
      summary: Receipt report
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptReport'
  /receipts/{id}/confirm:
    post:
      summary: Confirm receipt line items
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiptConfirmRequest'
      responses:
        '204':
          description: Confirmed
  /me/gamification:
    get:
      summary: Current user gamification state
      responses:
        '200':
          description: Gamification profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamificationProfile'
  /leaderboard/global:
    get:
      summary: Global leaderboard
      responses:
        '200':
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaderboardEntry'
  /leaderboard/friends:
    get:
      summary: Friends/family leaderboard
      responses:
        '200':
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaderboardEntry'
  /ranks:
    get:
      summary: Rank levels
      responses:
        '200':
          description: Rank levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RankLevel'
  /points/ledger:
    get:
      summary: Points ledger for authenticated user
      responses:
        '200':
          description: Ledger records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PointsLedgerRecord'
  /points/redeem/options:
    get:
      summary: Available points redemption options
      responses:
        '200':
          description: Redemption options
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RedeemOption'
  /points/redeem:
    post:
      summary: Redeem points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedeemRequest'
      responses:
        '200':
          description: Redemption result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'
  /plus/features:
    get:
      summary: Plus feature catalog
      responses:
        '200':
          description: Plus catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlusFeature'
  /plus/status:
    get:
      summary: Active plus entitlements
      responses:
        '200':
          description: Active features
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Entitlement'
  /plus/subscribe:
    post:
      summary: Activate plus by subscription (stub backend activation)
      responses:
        '200':
          description: Activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'
  /plus/unlock-with-points:
    post:
      summary: Unlock plus with points
      responses:
        '200':
          description: Activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'
  /families:
    post:
      summary: Create family household
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Household created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamilyHousehold'
  /families/{id}/invite:
    post:
      summary: Invite family member
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamilyInvite'
  /families/{id}/join:
    post:
      summary: Join family via invite token
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Joined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'
  /families/{id}/lists:
    get:
      summary: Family lists with items
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FamilyList'
  /families/{id}/lists/{listId}/items:
    post:
      summary: Add item to family list
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: listId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamilyListItem'
  /families/{id}/events/poll:
    post:
      summary: Poll family events by cursor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cursor:
                  type: integer
      responses:
        '200':
          description: Event page
          content:
            application/json:
              schema:
                type: object
  /missions/nearby:
    get:
      summary: Nearby open missions
      responses:
        '200':
          description: Mission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mission'
  /missions/{id}/start:
    post:
      summary: Start mission task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task started
          content:
            application/json:
              schema:
                type: object
  /missions/{id}/submit:
    post:
      summary: Submit mission proof
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Submission stored
          content:
            application/json:
              schema:
                type: object
  /missions/{id}/verify:
    post:
      summary: Verify mission proof
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Consensus status
          content:
            application/json:
              schema:
                type: object
  /proof/{id}/status:
    get:
      summary: Get proof status and consensus counters
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Proof status
          content:
            application/json:
              schema:
                type: object
  /proof/{id}/dispute:
    post:
      summary: Dispute proof
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dispute accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'
  /kids/activate:
    post:
      summary: Activate kids mode
      responses:
        '200':
          description: Session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KidsSession'
  /kids/missions:
    get:
      summary: Fetch missions for active kids session
      responses:
        '200':
          description: Mission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mission'
  /kids/missions/{id}/submit:
    post:
      summary: Submit kids mission
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Submission result
          content:
            application/json:
              schema:
                type: object
  /kids/deactivate:
    post:
      summary: Deactivate kids mode
      responses:
        '200':
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'
components:
  schemas:
    GuestSessionResponse:
      type: object
      properties:
        id:
          type: string
        expires_at:
          type: string
          format: date-time
    DemoSessionStartRequest:
      type: object
      properties:
        session_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
    DemoSessionPreviewReward:
      type: object
      properties:
        xp:
          type: integer
        points:
          type: integer
        mission_unlock_level:
          type: integer
    DemoSessionStartResponse:
      type: object
      properties:
        demo_token:
          type: string
        expires_at:
          type: string
          format: date-time
        preview_reward:
          $ref: '#/components/schemas/DemoSessionPreviewReward'
    DemoSessionClaimRequest:
      type: object
      required: [demo_token]
      properties:
        demo_token:
          type: string
    DemoSessionClaimResponse:
      type: object
      properties:
        claimed:
          type: boolean
        demo_session_id:
          type: string
        reward:
          $ref: '#/components/schemas/DemoSessionPreviewReward'
        award:
          type: object
          additionalProperties: true
        gamification:
          $ref: '#/components/schemas/GamificationProfile'
    UiEventRequest:
      type: object
      required: [event_name]
      properties:
        event_name:
          type: string
        session_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
    UiEventResponse:
      type: object
      properties:
        ok:
          type: boolean
        accepted:
          type: boolean
    RealtimeEvent:
      type: object
      properties:
        event_id:
          type: string
        type:
          type: string
          enum: [xp_awarded, mission_expiring, mission_verified, receipt_processed, price_drop, heartbeat]
        occurred_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]
    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: '#/components/schemas/UserProfile'
    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        city:
          type: string
        consents:
          type: object
    StorePin:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        chain:
          type: string
        lat:
          type: number
        lon:
          type: number
        verified_ratio:
          type: number
        updated_at:
          type: string
          format: date-time
        top_deals:
          type: array
          items:
            $ref: '#/components/schemas/DealSummary'
    StoreDetail:
      type: object
      properties:
        store:
          $ref: '#/components/schemas/StorePin'
        ending_soon:
          type: array
          items:
            $ref: '#/components/schemas/DealSummary'
        top_deals:
          type: array
          items:
            $ref: '#/components/schemas/DealSummary'
    CityFeed:
      type: object
      properties:
        deal_of_day:
          $ref: '#/components/schemas/DealSummary'
        price_shocks:
          type: array
          items:
            $ref: '#/components/schemas/DealSummary'
        new_flyers:
          type: array
          items:
            $ref: '#/components/schemas/DealSummary'
    DealSummary:
      type: object
      properties:
        product_id:
          type: string
        product_name:
          type: string
        price:
          type: number
        old_price:
          type: number
        source:
          type: string
        valid_to:
          type: string
          format: date
        savings_eur:
          type: number
        savings_percent:
          type: number
        verified:
          type: boolean
    SearchResult:
      type: object
      properties:
        product_id:
          type: string
        name:
          type: string
        best_price:
          type: number
        best_source:
          type: string
        unit_price:
          type: number
        store_chain:
          type: string
        updated_at:
          type: string
          format: date-time
    ProductDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        brand:
          type: string
        unit_price:
          type: number
        offers:
          type: array
          items:
            $ref: '#/components/schemas/DealSummary'
    BasketCreateRequest:
      type: object
      properties:
        name:
          type: string
    BasketItemsRequest:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
              raw_name:
                type: string
              quantity:
                type: number
    BasketOptimizeRequest:
      type: object
      properties:
        mode:
          type: string
        max_stores:
          type: integer
        travel_cost_eur:
          type: number
    Basket:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
    BasketPlan:
      type: object
      properties:
        total_price:
          type: number
        savings_eur:
          type: number
        plan:
          type: array
          items:
            type: object
            properties:
              store_name:
                type: string
              items:
                type: array
                items:
                  $ref: '#/components/schemas/DealSummary'
    ReceiptUploadRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
    ReceiptStatus:
      type: object
      properties:
        receipt_id:
          type: string
        status:
          type: string
        progress:
          type: integer
    ReceiptReport:
      type: object
      properties:
        overpaid_items:
          type: array
          items:
            $ref: '#/components/schemas/DealSummary'
        savings_total:
          type: number
        verified_ratio:
          type: number
    ReceiptConfirmRequest:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              receipt_item_id:
                type: string
              product_id:
                type: string
    BasicSuccess:
      type: object
      properties:
        success:
          type: boolean
    RankLevel:
      type: object
      properties:
        level:
          type: integer
        rank_name:
          type: string
        tier:
          type: string
        min_xp:
          type: integer
    GamificationProfile:
      type: object
      properties:
        spendable_points:
          type: integer
        lifetime_xp:
          type: integer
        rank:
          $ref: '#/components/schemas/RankLevel'
    LeaderboardEntry:
      type: object
      properties:
        position:
          type: integer
        user_id:
          type: string
        email_masked:
          type: string
        level:
          type: integer
        rank_name:
          type: string
        lifetime_xp:
          type: integer
        spendable_points:
          type: integer
    PointsLedgerRecord:
      type: object
      properties:
        id:
          type: string
        event_type:
          type: string
        xp_delta:
          type: integer
        points_delta:
          type: integer
        reference_type:
          type: string
        reference_id:
          type: string
        created_at:
          type: string
          format: date-time
    RedeemOption:
      type: object
      properties:
        reward_key:
          type: string
        points_cost:
          type: integer
        duration_days:
          type: integer
    RedeemRequest:
      type: object
      required: [reward_key]
      properties:
        reward_key:
          type: string
    PlusFeature:
      type: object
      properties:
        plan_code:
          type: string
        plan_name:
          type: string
        price_eur:
          type: number
        billing_days:
          type: integer
        feature_key:
          type: string
    Entitlement:
      type: object
      properties:
        feature_key:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        source_type:
          type: string
    FamilyHousehold:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        owner_user_id:
          type: string
        city_code:
          type: string
        currency:
          type: string
    FamilyInvite:
      type: object
      properties:
        id:
          type: string
        token:
          type: string
        role:
          type: string
        status:
          type: string
        expires_at:
          type: string
          format: date-time
    FamilyList:
      type: object
      properties:
        id:
          type: string
