version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_CONSOLE_PORT:-15672}:15672"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  api:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: sh -lc "npm -w services/api install --omit=dev && npm -w services/api run start"
    env_file:
      - ../services/api/.env
    environment:
      FEATURE_FLAGS_ENFORCE: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - postgres
      - rabbitmq
      - redis
    ports:
      - "3000:3000"
    volumes:
      - ..:/workspace
      - ../services/api/uploads:/workspace/services/api/uploads

  ai-gateway:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: sh -lc "npm -w services/ai-gateway install --omit=dev && npm -w services/ai-gateway run start"
    env_file:
      - ../services/ai-gateway/.env
    depends_on:
      - postgres
    ports:
      - "3001:3001"
    volumes:
      - ..:/workspace

  receipts:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: sh -lc "npm -w services/receipts install --omit=dev && npm -w services/receipts run start"
    env_file:
      - ../services/receipts/.env
    depends_on:
      - api
      - ai-gateway
      - rabbitmq
      - postgres
    ports:
      - "4002:4002"
    volumes:
      - ..:/workspace
      - ../services/api/uploads:/workspace/services/api/uploads

  ingest:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: sh -lc "npm -w services/ingest install --omit=dev && npm -w services/ingest run start"
    env_file:
      - ../services/ingest/.env
    depends_on:
      - postgres
    ports:
      - "3002:3002"
    volumes:
      - ..:/workspace

  analytics:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: sh -lc "npm -w services/analytics install --omit=dev && npm -w services/analytics run start"
    env_file:
      - ../services/analytics/.env
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "3004:3004"
    volumes:
      - ..:/workspace

  admin:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: sh -lc "npm -w apps/admin install --omit=dev && npm -w apps/admin run start"
    env_file:
      - ../apps/admin/.env
    depends_on:
      - api
      - postgres
    ports:
      - "3003:3003"
    volumes:
      - ..:/workspace

volumes:
  postgres_data:
  minio_data:
